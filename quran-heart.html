<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متتبع حفظ القرآن</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #f4fbf4;
  font-family: 'Amiri', serif;
  padding: 24px 16px 40px;
  background-image:
    radial-gradient(circle at 15% 15%, rgba(144,210,144,0.2) 0%, transparent 40%),
    radial-gradient(circle at 85% 85%, rgba(100,180,130,0.15) 0%, transparent 40%);
}

.header { text-align: center; margin-bottom: 28px; }

.basmala {
  font-family: 'Scheherazade New', serif;
  font-size: 1.9rem;
  color: #2d6e3a;
  margin-bottom: 10px;
  line-height: 1.6;
}

.subtitle { font-size: 1rem; color: #5a9e6a; margin-bottom: 12px; }

.counter {
  display: inline-block;
  background: linear-gradient(135deg, #7ec896, #3a8c52);
  color: white;
  padding: 6px 24px;
  border-radius: 30px;
  font-size: 1rem;
  box-shadow: 0 3px 12px rgba(50,140,80,0.25);
}

.juz-section {
  margin-bottom: 18px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(50,140,80,0.1);
  overflow: hidden;
  border: 1px solid #c8e8d0;
}

.juz-header {
  background: linear-gradient(135deg, #daf0e0, #bce0c8);
  padding: 8px 16px;
  font-family: 'Scheherazade New', serif;
  font-size: 0.95rem;
  color: #2d6e3a;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #c8e8d0;
}

.juz-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a8c52; }

.surahs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
  padding: 12px;
}

.surah-btn {
  background: #f6fcf7;
  border: 1.5px solid #b8dcc4;
  border-radius: 10px;
  padding: 8px 6px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: 'Amiri', serif;
  position: relative;
  user-select: none;
}

.surah-btn:hover {
  background: #dff2e5;
  border-color: #4a9e64;
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(50,140,80,0.15);
}

.surah-btn .num { font-size: 0.65rem; color: #8abfa0; display: block; margin-bottom: 2px; }
.surah-btn .name { font-size: 0.92rem; color: #1e5230; display: block; line-height: 1.3; }

.surah-btn.memorized {
  background: linear-gradient(135deg, #c8ecd4, #a0d8b4);
  border-color: #2e8c50;
  box-shadow: 0 2px 8px rgba(46,140,80,0.2);
}

.surah-btn.memorized .name { color: #1a4a28; font-weight: bold; }
.surah-btn.memorized .num { color: #4a9e64; }

.surah-btn.memorized::after {
  content: '✓';
  position: absolute;
  top: 3px;
  left: 6px;
  font-size: 0.65rem;
  color: #2e8c50;
}

.surah-btn:active { transform: scale(0.95); }

.progress-wrap { margin: 0 0 24px; text-align: center; }

.progress-bar-bg {
  height: 10px;
  background: #c8e8d0;
  border-radius: 10px;
  overflow: hidden;
  margin: 8px 0 4px;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #7ec896, #2e8c50);
  border-radius: 10px;
  transition: width 0.5s ease;
  width: 0%;
}

.progress-label { font-size: 0.85rem; color: #5a9e6a; }

.reset-btn {
  display: block;
  margin: 20px auto 0;
  background: transparent;
  border: 1.5px solid #7ec896;
  color: #2d6e3a;
  padding: 8px 28px;
  border-radius: 25px;
  font-family: 'Amiri', serif;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-btn:hover { background: #dff2e5; }

.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: linear-gradient(135deg, #7ec896, #3a8c52);
  color: white;
  padding: 10px 24px;
  border-radius: 25px;
  font-size: 0.95rem;
  box-shadow: 0 4px 16px rgba(50,140,80,0.3);
  z-index: 999;
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 480px) {
  .surahs-grid { grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 6px; }
  .surah-btn .name { font-size: 0.85rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="basmala">بِسْمِ اللهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
  <div class="subtitle">اضغط على السورة التي حفظتها لتتلوّن 🌿</div>
  <div class="counter" id="counter">٠ / ١١٤ سورة</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>
  <div class="progress-label" id="progressLabel">٠٪ من القرآن الكريم</div>
</div>

<div id="app"></div>

<button class="reset-btn" onclick="resetAll()">🔄 إعادة تعيين الكل</button>

<div class="toast" id="toast"></div>

  { num: 114, name: 'الناس', juz: 30 },

const JUZ_NAMES = {
  1:'الجزء الأول',2:'الجزء الثاني',3:'الجزء الثالث',4:'الجزء الرابع',5:'الجزء الخامس',
  6:'الجزء السادس',7:'الجزء السابع',8:'الجزء الثامن',9:'الجزء التاسع',10:'الجزء العاشر',
  11:'الجزء الحادي عشر',12:'الجزء الثاني عشر',13:'الجزء الثالث عشر',14:'الجزء الرابع عشر',
  15:'الجزء الخامس عشر',16:'الجزء السادس عشر',17:'الجزء السابع عشر',18:'الجزء الثامن عشر',
  19:'الجزء التاسع عشر',20:'الجزء العشرون',21:'الجزء الحادي والعشرون',22:'الجزء الثاني والعشرون',
  23:'الجزء الثالث والعشرون',24:'الجزء الرابع والعشرون',25:'الجزء الخامس والعشرون',
  26:'الجزء السادس والعشرون',27:'الجزء السابع والعشرون',28:'الجزء الثامن والعشرون',
  29:'الجزء التاسع والعشرون',30:'الجزء الثلاثون'
};

const STORAGE_KEY = 'quran_memorized_v2';
let memorized = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

function toArabicNum(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...memorized])); }

function updateUI() {
  const n = memorized.size;
  document.getElementById('counter').textContent = `${toArabicNum(n)} / ١١٤ سورة`;
  const pct = Math.round((n / 114) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${toArabicNum(pct)}٪ من القرآن الكريم`;
  document.querySelectorAll('.surah-btn').forEach(btn => {
    btn.classList.toggle('memorized', memorized.has(parseInt(btn.dataset.num)));
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function toggleSurah(num, name) {
  if (memorized.has(num)) { memorized.delete(num); showToast(`تمت إزالة سورة ${name}`); }
  else { memorized.add(num); showToast(`ما شاء الله! حفظت سورة ${name} 🌿`); }
  saveState(); updateUI();
}

function resetAll() {
  if (confirm('هل تريد إعادة تعيين جميع السور؟')) { memorized.clear(); saveState(); updateUI(); }
}

function buildApp() {
  const app = document.getElementById('app');
  const byJuz = {};
  SURAHS.forEach(s => { if (!byJuz[s.juz]) byJuz[s.juz] = []; byJuz[s.juz].push(s); });
  Object.keys(byJuz).sort((a,b) => a-b).forEach(juz => {
    const section = document.createElement('div');
    section.className = 'juz-section';
    const header = document.createElement('div');
    header.className = 'juz-header';
    header.innerHTML = `<span class="dot"></span>${JUZ_NAMES[juz]}`;
    section.appendChild(header);
    const grid = document.createElement('div');
    grid.className = 'surahs-grid';
    byJuz[juz].forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'surah-btn';
      btn.dataset.num = s.num;
      if (memorized.has(s.num)) btn.classList.add('memorized');
      btn.innerHTML = `<span class="num">${toArabicNum(s.num)}</span><span class="name">${s.name}</span>`;
      btn.onclick = () => toggleSurah(s.num, s.name);
      grid.appendChild(btn);
    });
    section.appendChild(grid);
    app.appendChild(section);
  });
}

buildApp();
updateUI();
</script>
</body>
</html>
